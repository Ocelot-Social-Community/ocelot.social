name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.0.3
      with:
        node-version-file: '.nvmrc'

    - name: Build Vuepress Pages
      run: npm install && npm run build
      # env:
      #   VUEPRESS_BASE: '/ocelot.social/'

    - name: Deploy Vuepress to Github Pages
      uses: crazy-max/ghaction-github-pages@1d6ee9b181a81033a16bd707a1401afa978daab4 # v4.0.0
      with:
        target_branch: gh-pages
        build_dir: docs/.vuepress/dist
        author: Wolfgang Huß <vorstand@busfaktor.org>
        fqdn: ocelot.social
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
